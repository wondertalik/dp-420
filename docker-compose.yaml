services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    volumes:
      - ${VOLUMES_PATH}/azurite/data:/opt/azurite/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 -l data --skipApiVersionCheck"
    healthcheck:
      test: nc 127.0.0.1 10000 -z
      interval: 1s
      retries: 30
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
      - "5310:5300"
    networks:
      - cosmos_backend
  azurite-init:
    image: mcr.microsoft.com/azure-cli
    depends_on:
      azurite:
        condition: service_healthy
    volumes:
      - ./init-azurite-containers.sh:/init-azurite-containers.sh:ro
    environment:
      - PYTHONWARNINGS=ignore
      - AZURITE_CONNECTION_STRING=${AZURITE_CONNECTION_STRING}
    entrypoint: ["sh", "/init-azurite-containers.sh"]
    networks:
      - cosmos_backend
  redis-db:
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    networks:
      - cosmos_backend
  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-EN20260602
    volumes:
      - ${VOLUMES_PATH}/cosmos/data:/usr/cosmos/data
    ports:
      - "${COSMOS_CONTAINER_HEALTH_PORT:-8080}:8080"
      - "${COSMOS_CONTAINER_PORT:-8081}:8081"
      - "${COSMOS_EXPLORER_PORT:-1234}:1234"
    environment:
      DATA_PATH: /usr/cosmos/data
      PROTOCOL: https
      ENABLE_OTLP_EXPORTER: "${COSMOS_ENABLE_OTLP:-false}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4316"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      ENABLE_INIT_DATA: true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
    networks:
      - cosmos_backend
networks:
  cosmos_backend:
    driver: bridge
